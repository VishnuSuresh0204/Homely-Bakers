{% extends 'USER/userCommon.html' %}
{% load static %}
{% for m in messages %}
<script>
    alert("{{m}}")
</script>
{% endfor %}
{% block content %}

<!--Page Title-->
<section class="page-title" style="background-image:url(../static/images/background/34.jpg)">
    <div class="auto-container">
        <h1>View Cakes</h1>
        <ul class="page-breadcrumb">
            <li><a href="/">home</a></li>
            <li>View Cakes</li>
        </ul>
    </div>
</section>
<!--End Page Title-->

<!--Sidebar Page Container-->
<div class="sidebar-page-container">
    <div class="auto-container">
        <div class="row clearfix">
            <!--Content Side-->
            <div class="content-side col-lg-12 col-md-12 col-sm-12">
                <!-- Search Widget -->
                <div class="sidebar-widget search-widget" style="margin-bottom: 20px;">
                    <form method="post">
                        <div class="form-group" style="display: flex;">
                            <input type="search" name="search-field" value="" placeholder="Search cakes…" required 
                                style="flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
                            <button type="submit" 
                                style="padding: 10px 20px; margin-left: 5px; background-color: #e79b9b; color: white; border: none; border-radius: 5px;">
                                <span class="icon fa fa-search"></span>
                            </button>
                        </div>
                    </form>
                </div>
                <style>
                    .our-shop .row {
                        display: flex;
                        flex-wrap: wrap;
                    }
                    .shop-item {
                        margin-bottom: 30px;
                        display: flex;
                    }
                    .shop-item .inner-box {
                        display: flex;
                        flex-direction: column;
                        width: 100%;
                        height: 100%;
                        border: 1px solid #f1f1f1;
                        border-radius: 15px;
                        overflow: hidden;
                        box-shadow: 0 5px 15px rgba(0,0,0,0.05);
                        transition: transform 0.3s ease;
                    }
                    .shop-item .inner-box:hover {
                        transform: translateY(-5px);
                    }
                    .shop-item .image-box {
                        height: 250px;
                        overflow: hidden;
                        position: relative;
                    }
                    .shop-item .image-box img {
                        width: 100%;
                        height: 100%;
                        object-fit: cover;
                    }
                    .shop-item .lower-content {
                        flex-grow: 1;
                        padding: 20px;
                        display: flex;
                        flex-direction: column;
                        justify-content: space-between;
                        text-align: center;
                    }
                    .shop-item .name {
                        margin-bottom: 10px;
                        font-size: 18px;
                        height: 2.4em; /* Max 2 lines height */
                        overflow: hidden;
                        display: -webkit-box;
                        -webkit-line-clamp: 2;
                        line-clamp: 2;
                        -webkit-box-orient: vertical;
                    }
                    .shop-item .price {
                        font-weight: bold;
                        color: #ff5e5e;
                        font-size: 20px;
                        margin-bottom: 15px;
                    }
                </style>
                <div class="our-shop">
                    <div class="row clearfix">
                        {% for i in data %}
                        <!-- Shop Item --> 
                        <div class="shop-item col-lg-4 col-md-6 col-sm-12">
                            <div class="inner-box">
                                <div class="image-box">
                                    <div class="sale-tag">sale!</div>
                                    <figure class="image">
                                        <a href="/cakeDetail?id={{i.id}}">
                                            <img src="/static/media/{{i.CakeImage}}" alt="Cake Image" style="border-radius: 10px;">
                                        </a>
                                    </figure>
                                </div>
                                <div class="lower-content">
                                    <h4 class="name"><a href="/cakeDetail?id={{i.id}}">{{i.CakeName}}</a></h4>
                                    <div class="rating">
                                        <span class="fa fa-star"></span>
                                        <span class="fa fa-star"></span>
                                        <span class="fa fa-star"></span>
                                        <span class="fa fa-star"></span>
                                        <span class="fa fa-star light"></span>
                                    </div>
                                    <div class="price">
                                        {% if i.Discount %}
                                            <del>₹{{i.Discount}}</del>
                                        {% endif %}
                                        ₹{{i.CakePrice}}
                                    </div>
                                    <div style="margin-top: 10px; text-align: center;">
                                        <a href="/cakeDetail?id={{i.id}}" class="btn btn-primary" style="padding: 5px 15px; border-radius: 5px;">View Details</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!--End Sidebar Page Container-->
{% endblock %}
