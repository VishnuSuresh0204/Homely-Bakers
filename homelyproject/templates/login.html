{% extends 'common.html' %}
{% load static %}
{% for m in messages %}
<script>
    alert("{{m}}")
</script>
{% endfor %}
{% block content %}

    <!--Page Title-->
    <section class="page-title" style="background-image:url(/static/images/background/34.jpg)">
        <div class="auto-container">
            <h1>Login</h1>
            <ul class="page-breadcrumb">
                <li><a href="/">home</a></li>
                <li>Login</li>
            </ul>
        </div>
    </section>
    <!--End Page Title-->
    <!--Login Section-->
    <section class="login-section">
        <div class="auto-container">
            <!-- Login Form -->
            <div class="login-form" style="margin-left: 280px;">
                <h2>Login</h2>
                <!--Login Form-->
                <form method="post">
                    {% csrf_token %}
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" name="email" placeholder="" required style="width: 600px;">
                    </div>
                    
                    <div class="form-group">
                        <label>Password *</label>
                        <input type="password" name="pass" placeholder="" required style="width: 600px;">
                    </div>
                    
                    <div class="form-group">
                        <input class="theme-btn" type="submit" name="submit-form" value="Log in">
                    </div>
                </form>
            </div>
            <!--End Login Form -->  
        </div>
    </section>
    <!--End Login Section-->

{% endblock %}
