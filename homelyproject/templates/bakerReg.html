{% extends 'common.html' %}
{% load static %}

{% for m in messages %}
<script>
alert("{{m}}")
</script>
{% endfor %}

{% block content %}

<!--Page Title-->
<section class="page-title" style="background-image:url(/static/images/background/34.jpg)">
    <div class="auto-container">
        <h1>Baker Register</h1>
        <ul class="page-breadcrumb">
            <li><a href="/">home</a></li>
            <li>Baker Register</li>
        </ul>
    </div>
</section>
<!--End Page Title-->

<!--Registration Section-->
<section class="login-section">
<div class="auto-container">

<div class="login-form" style="margin-left:280px;">
<h2>Baker Register</h2>

<form method="post" enctype="multipart/form-data" onsubmit="return validateFiles()">
{% csrf_token %}

<!-- Username -->
<div class="form-group">
<label>Username *</label>
<input type="text"
       name="username"
       required
       minlength="3"
       maxlength="20"
       pattern="[A-Za-z0-9_]+"
       title="Username should contain only letters, numbers or underscore"
       style="width:600px;border:1px solid #bfbbbb;">
</div>

<!-- Email -->
<div class="form-group">
<label>Email *</label>
<input type="email"
       name="email"
       required
       title="Enter a valid email address"
       style="width:600px;border:1px solid #bfbbbb;">
</div>

<!-- Phone -->
<div class="form-group">
<label>Phone *</label>
<input type="tel"
       name="phone"
       required
       pattern="[6-9]{1}[0-9]{9}"
       maxlength="10"
       title="Enter a valid 10 digit phone number"
       style="width:600px;border:1px solid #bfbbbb;">
</div>

<!-- Profile Picture -->
<div class="form-group">
<label>Profile Picture *</label>
<div style="border:1px solid #bfbbbb;padding:5px;width:600px;">
<input type="file"
       name="profile_picture"
       accept="image/png, image/jpeg, image/jpg"
       required>
</div>
</div>

<!-- Password -->
<div class="form-group">
<label>Password *</label>
<input type="password"
       name="password"
       required
       minlength="6"
       maxlength="20"
       pattern="^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d@#$!%*?&]{6,}$"
       title="Password must contain at least one letter and one number"
       style="width:600px;border:1px solid #bfbbbb;">
</div>

<!-- Experience -->
<div class="form-group">
<label>Experience (Years) *</label>
<input type="number"
       name="experience"
       required
       min="0"
       max="50"
       title="Enter experience in years"
       style="width:600px;border:1px solid #bfbbbb;">
</div>

<!-- Certificate -->
<div class="form-group">
<label>Certificate *</label>
<div style="border:1px solid #bfbbbb;padding:5px;width:600px;">
<input type="file"
       name="certi"
       accept=".pdf,.jpg,.jpeg,.png"
       required>
</div>
</div>

<!-- Address -->
<div class="form-group">
<label>Address *</label>
<div style="border:1px solid #bfbbbb;padding:6px;width:600px;">
<textarea name="address"
          required
          minlength="10"
          maxlength="200"
          style="width:580px;height:80px;border:none;"></textarea>
</div>
</div>

<div class="form-group">
<input class="theme-btn" type="submit" value="Register">
</div>

</form>
</div>

</div>
</section>

<script>
function validateFiles(){

let profile=document.querySelector("input[name='profile_picture']").files[0];
let cert=document.querySelector("input[name='certi']").files[0];

if(profile){
    if(profile.size > 2*1024*1024){
        alert("Profile image must be less than 2MB");
        return false;
    }
}

if(cert){
    if(cert.size > 5*1024*1024){
        alert("Certificate file must be less than 5MB");
        return false;
    }
}

return true;
}
</script>

{% endblock %}
