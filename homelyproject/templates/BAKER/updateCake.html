{% extends 'BAKER/bakerCommon.html' %}
{% load static %}
{% block content %}

<section class="page-title" style="background-image:url(/static/images/background/34.jpg)">
    <div class="auto-container">
        <h1>Update Cake Details</h1>
        <ul class="page-breadcrumb">
            <li><a href="/">home</a></li>
            <li>Update Cake</li>
        </ul>
    </div>
</section>

<section class="cake-section">
    <div class="auto-container">
        <div class="cake-form" style="margin-top: 50px;">
            <h2 style="margin-left:430px;">Update Cake Details</h2>
            {% for cake in edit %}
            <form method="post" enctype="multipart/form-data" style="margin-top: 20px;margin-left: 280px;">
                {% csrf_token %}
                <div class="form-group">
                    <label>Cake Name *</label>
                    <input type="text" name="CakeName" value="{{ cake.CakeName }}" required class="form-control" style="width: 600px;border: 1px solid #bfbbbb;">
                </div>

                <div class="form-group">
                    <label>Cake Description *</label>
                    <textarea name="CakeDescri" required class="form-control" style="width: 600px;border: 1px solid #bfbbbb;">{{ cake.CakeDescri }}</textarea>
                </div>

                <div class="form-group">
                    <label>Cake Image *</label>
                    <input type="file" name="CakeImage" class="form-control" style="width: 600px;border: 1px solid #bfbbbb;">
                    <img src="/static/media/{{ cake.CakeImage }}" alt="Cake Image" style="margin-top: 10px; width: 100px; border-radius: 5px;">
                </div>

                <div class="form-group">
                    <label>Cake Category *</label>
                    <select name="CakeCategory" required class="form-control" style="width: 600px;border: 1px solid #bfbbbb;">
                        <option value="Birthday" {% if cake.CakeCategory == "Birthday" %}selected{% endif %}>Birthday</option>
                        <option value="Wedding" {% if cake.CakeCategory == "Wedding" %}selected{% endif %}>Wedding</option>
                        <option value="Anniversary" {% if cake.CakeCategory == "Anniversary" %}selected{% endif %}>Anniversary</option>
                        <option value="Custom" {% if cake.CakeCategory == "Custom" %}selected{% endif %}>Custom</option>
                        <option value="Special" {% if cake.CakeCategory == "Special" %}selected{% endif %}>Special</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Cake Price *</label>
                    <input type="number" name="CakePrice" value="{{ cake.CakePrice }}" required class="form-control" style="width: 600px;border: 1px solid #bfbbbb;">
                </div>

                <div class="form-group">
                    <label>Cake Weight *</label>
                    <input type="text" name="CakeWeight" value="{{ cake.CakeWeight }}" required class="form-control" style="width: 600px;border: 1px solid #bfbbbb;">
                </div>

                <div class="form-group">
                    <label>Cake Flavor *</label>
                    <input type="text" name="CakeFlavor" value="{{ cake.CakeFlavor }}" required class="form-control" style="width: 600px;border: 1px solid #bfbbbb;">
                </div>

                <div class="form-group">
                    <label>Cake Ingredients *</label>
                    <textarea name="CakeIngredients" required class="form-control" style="width: 600px;border: 1px solid #bfbbbb;">{{ cake.CakeIngredients }}</textarea>
                </div>

                <div class="form-group">
                    <label>Customizable Options *</label>
                    <div>
                        <label style="margin-right: 15px;">
                            <input type="radio" name="CustomizableOptionsToggle" value="Yes" {% if cake.CustomizableOptions != 'None' %}checked{% endif %} onclick="toggleOptions(true)"> Yes
                        </label>
                        <label>
                            <input type="radio" name="CustomizableOptionsToggle" value="No" {% if cake.CustomizableOptions == 'None' %}checked{% endif %} onclick="toggleOptions(false)"> No
                        </label>
                    </div>
                    <div id="checkboxOptions" style="padding: 10px; margin-top: 10px;">
                        <label><input type="checkbox" name="CustomizableOptions[]" value="Personalized Message" {% if 'Personalized Message' in cake.CustomizableOptions %}checked{% endif %}> Add a personalized message</label><br>
                        <label><input type="checkbox" name="CustomizableOptions[]" value="Change Flavor" {% if 'Change Flavor' in cake.CustomizableOptions %}checked{% endif %}> Change flavor</label><br>
                        <label><input type="checkbox" name="CustomizableOptions[]" value="Add Toppings" {% if 'Add Toppings' in cake.CustomizableOptions %}checked{% endif %}> Add toppings</label><br>
                        <label><input type="checkbox" name="CustomizableOptions[]" value="Custom Shape" {% if 'Custom Shape' in cake.CustomizableOptions %}checked{% endif %}> Custom shape</label><br>
                        <label><input type="checkbox" name="CustomizableOptions[]" value="Extra Layers" {% if 'Extra Layers' in cake.CustomizableOptions %}checked{% endif %}> Extra layers</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Stock Quantity *</label>
                    <input type="number" name="StockQuantity" value="{{ cake.StockQuantity }}" required class="form-control" style="width: 600px;border: 1px solid #bfbbbb;">
                </div>

                <div class="form-group">
                    <input class="theme-btn btn btn-info" type="submit" value="Update Cake" style="padding: 10px 20px; border-radius: 20px; font-size: 16px;">
                </div>
            </form>
            {% endfor %}
        </div>
    </div>
</section>

<script>
    function toggleOptions(show) {
        const checkboxOptions = document.getElementById('checkboxOptions');
        checkboxOptions.style.display = show ? 'block' : 'none';
    }
</script>

{% endblock %}
